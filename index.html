<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizLens — AI Answer Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #252932;
    --border2: #2e3440;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --red: #ef4444;
    --amber: #f59e0b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #4b5563;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
    --radius: 12px;
    --radius-sm: 7px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; overflow: hidden; }

  body { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 9px; font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
  .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .status-pill { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 11px; font-family: var(--mono); color: var(--text-dim); background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
  .dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.scanning { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* ── Layout ── */
  main { display: grid; grid-template-columns: 300px 1fr; overflow: hidden; height: 100%; }

  /* ── Sidebar ── */
  aside { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .panel { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }

  label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
  input[type="text"], input[type="password"], input[type="number"], textarea, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text); padding: 7px 10px; font-size: 12px; font-family: var(--sans); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 10px;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  input[type="password"] { font-family: var(--mono); }
  textarea { resize: vertical; min-height: 60px; }

  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; font-family: var(--sans); width: 100%; justify-content: center; }
  .btn-primary { background: var(--accent); color: #fff; padding: 11px; }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { background: var(--border2); color: var(--text-muted); cursor: not-allowed; }
  .btn-danger { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); margin-top: 8px; }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border2); margin-top: 8px; }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  /* ── Camera ── */
  .camera-wrapper { position: relative; border-radius: var(--radius-sm); overflow: hidden; background: var(--surface2); border: 1px solid var(--border); aspect-ratio: 4/3; margin-bottom: 10px; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .camera-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; color: var(--text-muted); font-size: 11px; text-align: center; padding: 16px; }
  .camera-overlay svg { width: 32px; height: 32px; opacity: 0.35; }
  .scan-ring { position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .scan-ring.active { opacity: 1; }
  .scan-ring::before { content: ''; position: absolute; inset: 6px; border: 2px solid var(--accent); border-radius: 6px; animation: scanpulse 0.8s ease-in-out; }
  @keyframes scanpulse { 0% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); } 100% { opacity: 0; box-shadow: 0 0 0 20px transparent; } }
  .timer-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); transition: width 1s linear; width: 0%; }
  .countdown-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: var(--accent); font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; border: 1px solid rgba(59,130,246,0.3); backdrop-filter: blur(4px); }
  .api-key-row { position: relative; }
  .toggle-key { position: absolute; right: 8px; top: 8px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; padding: 0; }

  /* ── RIGHT SIDE (BEZ SCROLLOWANIA) ── */
  .right { display: flex; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg); }

  /* Stats bar */
  .stats-bar { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stat-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; border-right: 1px solid var(--border); font-family: var(--mono); }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 9px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Główny kontener na wyniki */
  .answer-area {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden; /* Zakaz scrollowania */
    gap: 15px;
  }

  /* Ekran powitalny, ładowania itp. zajmują całą przestrzeń */
  .idle-screen, .loading-view, .error-view, .no-q-view { 
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; color: var(--text-muted); 
  }
  .idle-screen svg { width: 50px; height: 50px; opacity: 0.2; }
  .idle-screen h2 { font-size: 20px; font-weight: 700; color: var(--text-dim); }
  
  .big-spinner { width: 44px; height: 44px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Kompaktowe Pytanie na górze */
  .q-section { flex-shrink: 0; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .q-box { font-size: 14px; font-weight: 500; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; max-height: 75px; overflow-y: auto; }

  /* KLUCZOWE: Ogromne, widoczne odpowiedzi na środku */
  .answers-section { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
  }
  .answers-list { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    justify-content: center;
  }

  /* Wielkie kafelki odpowiedzi */
  .opt { 
    display: flex; 
    align-items: center; 
    gap: 16px; 
    padding: 18px 24px; 
    border-radius: var(--radius); 
    border: 2px solid var(--border); 
    background: var(--surface); 
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    animation: popIn 0.2s ease both; 
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  
  /* Super widoczna poprawna odpowiedź */
  .opt.correct { 
    border-color: var(--green); 
    background: var(--green-dim); 
    box-shadow: 0 0 15px rgba(34,197,94,0.15);
    transform: scale(1.02);
  }
  .opt.wrong { opacity: 0.25; filter: blur(0.5px); }
  
  .opt-badge { font-family: var(--mono); font-size: 16px; font-weight: 800; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--border2); color: var(--text-dim); }
  .opt.correct .opt-badge { background: var(--green); color: #000; font-size: 18px; }
  
  .opt-text { flex: 1; font-size: 20px; font-weight: 600; line-height: 1.3; color: var(--text-dim); }
  .opt.correct .opt-text { color: #ffffff; font-size: 24px; font-weight: 700; }
  
  .check { font-size: 26px; color: var(--green); flex-shrink: 0; display: none; font-weight: bold; }
  .opt.correct .check { display: block; }

  /* Dyskretne Wyjaśnienie na samym dole */
  .expl-section { flex-shrink: 0; }
  .expl-box { background: rgba(59,130,246,0.04); border: 1px solid rgba(59,130,246,0.1); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--text-muted); max-height: 60px; overflow-y: auto; }
  .expl-box b { color: var(--accent); }

  .ts { font-size: 10px; font-family: var(--mono); color: var(--text-muted); margin-bottom: 2px; text-align: right; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #e2e8f0; padding: 10px 20px; border-radius: 99px; font-size: 13px; z-index: 9999; border: 1px solid #334155; white-space: nowrap; }

  canvas { display: none; }

  @media (max-width: 720px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    aside { max-height: 40vh; }
    .opt-text { font-size: 16px; }
    .opt.correct .opt-text { font-size: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔍</div>
    QuizLens
  </div>
  <div class="status-pill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Gotowy</span>
  </div>
</header>

<main>
  <aside>
    <div class="panel">
      <div class="panel-title">OpenRouter API</div>
      <label>Klucz API</label>
      <div class="api-key-row">
        <input type="password" id="apiKey" placeholder="sk-or-..." autocomplete="off">
        <button class="toggle-key" onclick="toggleKey()">👁</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Kamera</div>
      <div class="camera-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="camera-overlay" id="cameraOverlay">Wczytywanie...</div>
        <div class="scan-ring" id="scanRing"></div>
        <div class="timer-bar" id="timerBar"></div>
        <div class="countdown-badge" id="countdown" style="display:none"></div>
      </div>
      <label>Wybór kamery</label>
      <select id="cameraSelect"><option value="">Domyślna</option></select>
    </div>

    <div class="panel">
      <div class="panel-title">Ustawienia</div>
      <label>Interwał skanowania (sekundy)</label>
      <input type="number" id="interval" value="10" min="3" max="300">
      <label>Kontekst</label>
      <textarea id="context" placeholder="np. Test z historii."></textarea>
    </div>

    <div class="panel" style="border-bottom:none">
      <button class="btn btn-primary" id="startBtn" onclick="startScanning()">▶ START AUTOMAT</button>
      <button class="btn btn-danger" id="stopBtn" onclick="stopScanning()" style="display:none">⏹ STOP</button>
      <button class="btn btn-ghost" onclick="captureNow()">📸 SKANUJ TERAZ</button>
    </div>
  </aside>

  <div class="right">
    <div class="stats-bar" id="statsBar">
      <div class="stat-item"><span class="stat-val" id="statScans">0</span><span class="stat-label">skanów</span></div>
      <div class="stat-item"><span class="stat-val" id="statAnswers">0</span><span class="stat-label">odpowiedzi</span></div>
      <div class="stat-item"><span class="stat-val" id="statErrors">0</span><span class="stat-label">błędów</span></div>
    </div>

    <div class="answer-area" id="answerArea">
      <div class="idle-screen" id="idleScreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <h2>System gotowy</h2>
        <p>Wklej klucz API i kliknij Skanuj Teraz lub Start.</p>
      </div>
    </div>
  </div>
</main>

<canvas id="canvas"></canvas>

<script>
let stream = null, intervalId = null, countdownId = null;
let countdownVal = 0, scanning = false;
let stats = { scans: 0, answers: 0, errors: 0 };

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx2d = canvas.getContext('2d');

window.addEventListener('DOMContentLoaded', async () => {
  await loadCameras();
  initCamera();
});

function toggleKey() {
  const input = document.getElementById('apiKey');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function initCamera(deviceId) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  const constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: 'environment' }, audio: false };
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    document.getElementById('cameraOverlay').style.display = 'none';
    return true;
  } catch(e) { 
    document.getElementById('cameraOverlay').textContent = 'Brak kamery.';
    return false; 
  }
}

async function loadCameras() {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true });
    const devices = await navigator.mediaDevices.enumerateDevices();
    const sel = document.getElementById('cameraSelect');
    sel.innerHTML = '<option value="">Domyślna (Tył)</option>';
    devices.filter(d => d.kind === 'videoinput').forEach((c, i) => {
      const o = document.createElement('option');
      o.value = c.deviceId;
      o.textContent = c.label || `Kamera ${i+1}`;
      sel.appendChild(o);
    });
  } catch(_) {}
}

document.getElementById('cameraSelect').addEventListener('change', e => {
  initCamera(e.target.value);
});

function captureFrame() {
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  ctx2d.drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
}

function flashScan() {
  const r = document.getElementById('scanRing');
  r.classList.remove('active'); void r.offsetWidth; r.classList.add('active');
  setTimeout(() => r.classList.remove('active'), 900);
}

function updateStats() {
  document.getElementById('statScans').textContent = stats.scans;
  document.getElementById('statAnswers').textContent = stats.answers;
  document.getElementById('statErrors').textContent = stats.errors;
}

function startCountdown(seconds) {
  const bar = document.getElementById('timerBar');
  const badge = document.getElementById('countdown');
  badge.style.display = 'block';
  countdownVal = seconds;
  badge.textContent = countdownVal + 's';
  bar.style.transition = 'none'; bar.style.width = '100%'; void bar.offsetWidth;
  bar.style.transition = `width ${seconds}s linear`; bar.style.width = '0%';
  clearInterval(countdownId);
  countdownId = setInterval(() => {
    countdownVal--;
    badge.textContent = countdownVal + 's';
    if (countdownVal <= 0) clearInterval(countdownId);
  }, 1000);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

async function askGemini(imageBase64) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) throw new Error('Wprowadź klucz API OpenRouter.');
  const context = document.getElementById('context').value.trim();

  const prompt = `Jesteś asystentem rozwiązującym pytania testowe.
Zadanie:
1. Rozpoznaj pytanie na zdjęciu
2. Zidentyfikuj opcje odpowiedzi (A, B, C, D itp.)
3. Wskaż WSZYSTKIE POPRAWNE odpowiedzi
4. Krótko wyjaśnij dlaczego

${context ? 'Kontekst: ' + context : ''}

Odpowiedz TYLKO w formacie JSON:
{"question":"treść pytania","answers":[{"label":"A","text":"opcja","correct":true}],"explanation":"wyjaśnienie"}

Jeśli brak pytania: {"question":null,"answers":[],"explanation":"Nie wykryto pytania."}`;

  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
      'HTTP-Referer': window.location.href,
      'X-Title': 'QuizLens'
    },
    body: JSON.stringify({
      model: 'google/gemini-2.5-flash:free',
      messages: [
        {
          role: 'user',
          content: [
            { type: 'text', text: prompt },
            { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${imageBase64}` } }
          ]
        }
      ],
      temperature: 0.1,
      max_tokens: 1024
    })
  });

  if (!res.ok) { 
    const e = await res.json().catch(() => ({})); 
    throw new Error(e.error?.message || `HTTP ${res.status}`); 
  }

  const data = await res.json();
  const text = (data.choices?.[0]?.message?.content || '').trim();
  const clean = text.replace(/```json|```/g, '').trim();
  const match = clean.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Błąd struktury odpowiedzi API.');
  return JSON.parse(match[0]);
}

function setAreaContent(html) {
  document.getElementById('answerArea').innerHTML = html;
}

function showLoading(thumbSrc) {
  setAreaContent(`
    <div class="loading-view">
      <div class="big-spinner"></div>
      <div class="loading-label">Analizuję zdjęcie…</div>
    </div>
  `);
}

function showError(msg) {
  stats.errors++;
  updateStats();
  setAreaContent(`
    <div class="error-view">
      <div class="err-icon">⚠️</div>
      <h3>Błąd</h3>
      <p>${msg}</p>
    </div>
  `);
}

function showAnswer(result, thumbSrc) {
  if (!result.question) {
    setAreaContent(`
      <div class="no-q-view">
        <div class="icon">📷</div>
        <p>Nie wykryto pytania testowego.</p>
      </div>
    `);
    return;
  }

  stats.answers++;
  updateStats();
  
  const time = new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  const answersHtml = result.answers.length > 0
    ? result.answers.map((a, i) => `
        <div class="opt ${a.correct ? 'correct' : 'wrong'}">
          <div class="opt-badge">${a.label || (i + 1)}</div>
          <div class="opt-text">${a.text}</div>
          <div class="check">✓ ODP</div>
        </div>
      `).join('')
    : `<div style="color:var(--text-dim);text-align:center;font-size:18px;">Pytanie otwarte (brak opcji A/B/C/D)</div>`;

  setAreaContent(`
    <div class="q-section">
      <div class="section-label">Pytanie</div>
      <div class="q-box">${result.question}</div>
    </div>
    
    <div class="answers-section">
      <div class="answers-list">${answersHtml}</div
