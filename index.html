<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizLens — AI Answer Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&family=JetBrains+Mono:wght=400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #252932;
    --border2: #2e3440;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.15);
    --red: #ef4444;
    --amber: #f59e0b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #4b5563;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
    --radius: 12px;
    --radius-sm: 7px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; overflow: hidden; }

  body { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 9px; font-size: 17px; font-weight: 700; letter-spacing: -0.4px; }
  .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .status-pill { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 11px; font-family: var(--mono); color: var(--text-dim); background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
  .dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.scanning { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* ── Layout ── */
  main { display: grid; grid-template-columns: 300px 1fr; overflow: hidden; height: 100%; }

  /* ── Sidebar ── */
  aside { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .panel { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }

  label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
  input[type="text"], input[type="password"], input[type="number"], textarea, select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text); padding: 7px 10px; font-size: 12px; font-family: var(--sans); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 10px;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  input[type="password"] { font-family: var(--mono); }
  textarea { resize: vertical; min-height: 60px; }

  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; font-family: var(--sans); width: 100%; justify-content: center; }
  .btn-primary { background: var(--accent); color: #fff; padding: 11px; }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { background: var(--border2); color: var(--text-muted); cursor: not-allowed; }
  .btn-danger { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); margin-top: 8px; }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border2); margin-top: 8px; }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  /* ── Camera ── */
  .camera-wrapper { position: relative; border-radius: var(--radius-sm); overflow: hidden; background: var(--surface2); border: 1px solid var(--border); aspect-ratio: 4/3; margin-bottom: 10px; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .camera-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; color: #ef4444; font-size: 11px; text-align: center; padding: 16px; background: rgba(0,0,0,0.4); font-weight: 500; }
  .scan-ring { position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .scan-ring.active { opacity: 1; }
  .scan-ring::before { content: ''; position: absolute; inset: 6px; border: 2px solid var(--accent); border-radius: 6px; animation: scanpulse 0.8s ease-in-out; }
  @keyframes scanpulse { 0% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); } 100% { opacity: 0; box-shadow: 0 0 0 20px transparent; } }
  .timer-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); transition: width 1s linear; width: 0%; }
  .countdown-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: var(--accent); font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; border: 1px solid rgba(59,130,246,0.3); backdrop-filter: blur(4px); }
  .api-key-row { position: relative; }
  .toggle-key { position: absolute; right: 8px; top: 8px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; padding: 0; }

  /* ── RIGHT SIDE ── */
  .right { display: flex; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg); }

  .stats-bar { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stat-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; border-right: 1px solid var(--border); font-family: var(--mono); }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 9px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  .answer-area {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
    gap: 12px;
  }

  .idle-screen, .loading-view, .error-view, .no-q-view { 
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; color: var(--text-muted); 
  }
  .idle-screen svg { width: 50px; height: 50px; opacity: 0.2; }
  .idle-screen h2 { font-size: 20px; font-weight: 700; color: var(--text-dim); }
  
  .big-spinner { width: 44px; height: 44px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .q-section { flex-shrink: 0; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .q-box { font-size: 14px; font-weight: 500; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; max-height: 70px; overflow-y: auto; }

  .answers-section { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
  }
  .answers-list { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    justify-content: center;
  }

  .opt { 
    display: flex; 
    align-items: center; 
    gap: 16px; 
    padding: 16px 22px; 
    border-radius: var(--radius); 
    border: 2px solid var(--border); 
    background: var(--surface); 
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    animation: popIn 0.2s ease both; 
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  
  .opt.correct { 
    border-color: var(--green); 
    background: var(--green-dim); 
    box-shadow: 0 0 12px rgba(34,197,94,0.12);
    transform: scale(1.01);
  }
  .opt.wrong { opacity: 0.25; filter: blur(0.4px); }
